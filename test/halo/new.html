<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSG.无言 职业生涯数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      body {
        font-family: 'Inter', 'Microsoft YaHei', sans-serif;
        background-color: #f4f7fa;
      }
      .radar-container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .data-card {
        transition: all 0.3s ease;
      }
      .data-card:hover {
        transform: translateY(-2px);
      }
      .rank-tag-gold {
        background: #ffd700;
        color: #8b4513;
        font-weight: bold;
      }
      .rank-tag-blue {
        background: #e0e7ff;
        color: #4338ca;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div id="app" class="max-w-7xl mx-auto hidden">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-xl shadow-sm mb-6"
      >
        <div class="flex items-center space-x-4">
          <img
            id="player-img"
            src="https://image.ttwz.vip/player/KSG_Wuyan.png"
            class="w-20 h-20 rounded-full border-4 border-blue-100"
            alt="无言"
          />
          <div>
            <h1 class="text-3xl font-bold text-gray-800" id="player-name">KSG.无言</h1>
            <div class="flex space-x-2 mt-1">
              <span class="px-3 py-1 bg-blue-600 text-white text-xs rounded-full">对抗路</span>
              <span class="text-gray-500 text-sm py-1" id="real-name">赵昊宇</span>
            </div>
          </div>
        </div>
        <div class="mt-4 md:mt-0 text-right">
          <p class="text-gray-400 text-sm">个人总分</p>
          <p class="text-4xl font-bold text-blue-600" id="overall-rating">0.00</p>
          <div class="flex justify-end space-x-4 mt-2 text-sm">
            <span>全服排名: <b id="overall-rank">--</b> <span id="rank-trend"></span></span>
            <span>位置排名: <b id="pos-rank">--</b></span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-xl shadow-sm">
          <h2 class="text-xl font-bold mb-6 flex items-center">
            <span class="w-1 h-6 bg-blue-600 mr-2"></span> 高阶能力评分
          </h2>
          <div id="stats-list" class="space-y-5"></div>
        </div>

        <div class="radar-container p-6 flex flex-col items-center">
          <h2 class="text-xl font-bold mb-4 text-center">选手高阶能力雷达图</h2>
          <p class="text-gray-400 text-xs mb-6">与对抗路位置平均水平对比</p>
          <div id="radar-chart" style="width: 100%; height: 500px"></div>
        </div>
      </div>

      <div class="mt-8 bg-white p-6 rounded-xl shadow-sm">
        <h2 class="text-xl font-bold mb-6 text-center">⭐ 英雄池 (最近表现)</h2>
        <div id="hero-pool" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 text-center"></div>
      </div>
    </div>

    <div id="loader" class="text-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
      <p class="mt-4 text-gray-500">正在同步 KPL 实时数据...</p>
    </div>

    <script>
      async function initDashboard() {
        try {
          const response = await fetch(
            'http://47.102.210.150:5049/api/player-career?player_name=KSG.%E6%97%A0%E8%A8%80&season_type=all',
          );
          const result = await response.json();
          const data = result.data; // 假设返回格式为 {code: 200, data: {...}}

          // 1. 更新基础信息
          document.getElementById('overall-rating').innerText = data.overall_rating.toFixed(2);
          document.getElementById('overall-rank').innerText = data.overall_rank;
          document.getElementById('pos-rank').innerText = data.position_rank;

          // 排名趋势逻辑
          const trend = data.overall_rank_trend === 'UP' ? '↑' : data.overall_rank_trend === 'DOWN' ? '↓' : '-';
          const trendColor = data.overall_rank_trend === 'UP' ? 'text-red-500' : 'text-green-500';
          document.getElementById('rank-trend').innerHTML =
            `<span class="${trendColor}">${trend}${Math.abs(data.overall_rank_change)}</span>`;

          // 2. 渲染左侧列表
          const statsConfig = [
            { label: '输出能力', val: data.damage_output, rank: data.damage_output_position_rank },
            { label: '生存能力', val: data.durability, rank: data.durability_position_rank },
            { label: '经济发育', val: data.economy, rank: data.economy_position_rank },
            { label: '前期表现', val: data.early_game, rank: data.early_game_position_rank },
            { label: '中期表现', val: data.mid_game, rank: data.mid_game_position_rank },
            { label: '后期表现', val: data.late_game, rank: data.late_game_position_rank },
            { label: '团战能力', val: data.teamfight, rank: data.teamfight_position_rank },
            { label: '场面控制', val: data.map_control, rank: data.map_control_position_rank },
          ];

          const listHtml = statsConfig
            .map(
              (item) => `
                    <div class="data-card">
                        <div class="flex justify-between mb-1 text-sm">
                            <span class="text-gray-600 font-medium">${item.label}</span>
                            <div class="space-x-4">
                                <span class="text-blue-600 font-bold">${item.val} 分</span>
                                <span class="px-2 py-0.5 rounded text-xs ${item.rank <= 3 ? 'rank-tag-gold' : 'rank-tag-blue'}">排名 ${item.rank}</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full" style="width: ${item.val}%"></div>
                        </div>
                    </div>
                `,
            )
            .join('');
          document.getElementById('stats-list').innerHTML = listHtml;

          // 3. 渲染雷达图
          renderRadar(data);

          // 4. 展示英雄池 (模拟数据，可根据实际 heroes 接口替换)
          const mockHeroes = [
            { name: '马超', winRate: '85%', matches: 12 },
            { name: '关羽', winRate: '70%', matches: 10 },
            { name: '狂铁', winRate: '62%', matches: 8 },
            { name: '夏洛特', winRate: '100%', matches: 5 },
          ];
          document.getElementById('hero-pool').innerHTML = mockHeroes
            .map(
              (h) => `
                    <div class="p-3 border border-gray-100 rounded-lg">
                        <p class="font-bold text-gray-700">${h.name}</p>
                        <p class="text-green-500 text-xs font-bold">${h.winRate}</p>
                        <p class="text-gray-400 text-[10px]">${h.matches} 场</p>
                    </div>
                `,
            )
            .join('');

          // 隐藏 Loader 显示 App
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
        } catch (err) {
          console.error('数据加载失败:', err);
          document.getElementById('loader').innerHTML =
            '<p class="text-red-500">接口请求失败，请检查网络或跨域设置</p>';
        }
      }

      function renderRadar(data) {
        const chart = echarts.init(document.getElementById('radar-chart'));
        const option = {
          radar: {
            indicator: [
              { name: '输出', max: 100 },
              { name: '生存', max: 100 },
              { name: '经济', max: 100 },
              { name: '前期', max: 100 },
              { name: '中期', max: 100 },
              { name: '后期', max: 100 },
            ],
            shape: 'circle',
            splitNumber: 4,
            axisName: { color: '#999' },
            splitLine: { lineStyle: { color: 'rgba(0,0,0,0.05)' } },
            splitArea: { show: false },
          },
          series: [
            {
              type: 'radar',
              data: [
                {
                  value: [
                    data.damage_output,
                    data.durability,
                    data.economy,
                    data.early_game,
                    data.mid_game,
                    data.late_game,
                  ],
                  name: 'KSG.无言',
                  areaStyle: { color: 'rgba(59, 130, 246, 0.4)' },
                  lineStyle: { color: '#3b82f6', width: 2 },
                  itemStyle: { color: '#3b82f6' },
                },
                {
                  value: [85, 82, 80, 84, 85, 80], // 这里的对抗路均值建议从 team-season-summary 获取
                  name: '对抗路均值',
                  areaStyle: { color: 'rgba(156, 163, 175, 0.2)' },
                  lineStyle: { color: '#9ca3af', width: 1, type: 'dashed' },
                  itemStyle: { opacity: 0 },
                },
              ],
            },
          ],
        };
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
      }

      initDashboard();
    </script>
  </body>
</html>
