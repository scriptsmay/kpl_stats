<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<div id="wuyan-radar" style="width: 100%; height: 500px; margin: 20px 0"></div>

<script>
  // 初始化图表
  const chartDom = document.getElementById('wuyan-radar');
  const myChart = echarts.init(chartDom);

  // 异步获取数据
  async function fetchWuyanData() {
    try {
      // 请求选手能力接口
      const response = await fetch('http://47.102.210.150:5035/api/player-abilities/KPL2026S1');
      const data = await response.json();

      // 1. 自动定位无言的数据
      console.log('数据:', data);
      const wuyan = data && data.data && data.data.find((p) => p.player_name === 'KSG.无言');

      if (wuyan) {
        const option = {
          backgroundColor: '#ffffff',
          title: {
            text: 'KSG.无言 赛场能力全景',
            left: 'center',
            top: '20',
          },
          tooltip: {
            trigger: 'item',
          },
          radar: {
            indicator: [
              { name: '后期能力 (Late Game)', max: 100 },
              { name: '中期节奏 (Mid Game)', max: 100 },
              { name: '团战表现 (Teamfight)', max: 100 },
              { name: '承伤/坦度 (Tankiness)', max: 100 },
              { name: '地图控制 (Map Control)', max: 100 },
              { name: '入侵能力 (Invasion)', max: 100 },
            ],
            radius: '65%',
            splitNumber: 5,
            axisName: { color: '#666' },
            splitArea: { areaStyle: { color: ['#F5F7FA', '#FFF'] } },
          },
          series: [
            {
              name: '能力指标',
              type: 'radar',
              data: [
                {
                  value: [
                    wuyan.late_game, // 94
                    wuyan.mid_game, // 99
                    wuyan.teamfight, // 85
                    wuyan.tankiness, // 95
                    wuyan.map_control, // 91
                    wuyan.invasion_ability, // 82
                  ],
                  name: 'KSG.无言',
                  symbol: 'circle',
                  symbolSize: 6,
                  areaStyle: {
                    color: 'rgba(231, 76, 60, 0.4)', // 红色系，更符合热血赛场的氛围
                  },
                  lineStyle: {
                    color: '#E74C3C',
                    width: 3,
                  },
                  itemStyle: {
                    color: '#E74C3C',
                  },
                },
              ],
            },
          ],
        };

        myChart.setOption(option);
      }
    } catch (error) {
      console.error('接口请求失败:', error);
    }
  }

  fetchWuyanData();

  // 响应式处理
  window.addEventListener('resize', function () {
    myChart.resize();
  });
</script>
