# KPL Stats 后端服务
# 使用方式：docker-compose up -d

services:
  kpl-stats-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpl-stats-backend
    restart: unless-stopped
    ports:
      - '8001:8000'
    environment:
      - THIRD_PARTY_API_URL=${THIRD_PARTY_API_URL}
      - API_KEY=${API_KEY:-}
      - CACHE_TTL_HOURS=${CACHE_TTL_HOURS:-24}
      # Halo 博客 API 配置
      - HALO_API_BASE=${HALO_API_BASE:-https://blog.kplwuyan.site}
      - HALO_API_TOKEN=${HALO_API_TOKEN}
      - HALO_POSTS_CACHE_TTL_HOURS=${HALO_POSTS_CACHE_TTL_HOURS:-1}
      # Halo 视频 API 配置
      - HALO_VIDEO_GROUP_ID=${HALO_VIDEO_GROUP_ID:-attachment-group-25ptmssm}
      - HALO_VIDEO_CACHE_TTL_SECONDS=${HALO_VIDEO_CACHE_TTL_SECONDS:-600}
    volumes:
      # 持久化缓存文件
      - ./backend/data:/app/data
    networks:
      - kpl-network
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  kpl-network:
    driver: bridge
    name: kpl-network
