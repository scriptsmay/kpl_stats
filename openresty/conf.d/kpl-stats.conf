# KPL Stats 前端配置
# 将此文件放入 OpenResty 的 conf.d 目录并重启

server {
    listen 80;
    listen [::]:80;
    server_name data.kplwuyan.site;

    # 前端静态文件根目录
    root /var/www/kpl-stats/dist;
    index index.html;

    # 日志
    access_log /var/log/nginx/kpl-stats-access.log;
    error_log /var/log/nginx/kpl-stats-error.log;

    # 前端路由 - 所有请求返回 index.html（Vue Router 需要）
    location / {
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理 - 转发到后端容器
    location /api/ {
        proxy_pass http://localhost:8001/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 禁用请求体缓冲（可选，适合文件上传）
        # proxy_request_buffering off;
    }

    # 健康检查端点（可选）
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
